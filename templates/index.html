<style>
    /* 追加：レバーの演出 */
    .lever-container { margin: 20px; text-align: center; }
    .lever {
        width: 100px; height: 100px; 
        background: #555; border-radius: 10px;
        position: relative; cursor: pointer; transition: 0.3s;
    }
    .lever-handle {
        width: 20px; height: 60px; background: #ff7675;
        position: absolute; top: -40px; left: 40px;
        border-radius: 10px; transform-origin: bottom;
        transition: 0.5s;
    }
    .lever.active .lever-handle { transform: rotate(150deg); } /* 引いた時の動き */

    /* 学科選択の装飾 */
    .faculty-select {
        padding: 10px; background: #444; color: white;
        border: 2px solid var(--main-color); border-radius: 5px; margin-bottom: 20px;
    }
</style>

<body>
    <h1>✨ 聖なる履修ガチャ ✨</h1>
    
    <form id="gacha-form" action="/recommend_all" method="POST">
        <div>
            <label>所属学科：</label>
            <select name="faculty" class="faculty-select">
                <option value="英米">英米学科</option>
                <option value="二部英米">第2部英米学科</option>
                <option value="イスパニア">イスパニア学科</option>
                <option value="中国">中国学科</option>
                <option value="ロシア">ロシア学科</option>
            </select>
        </div>

        <table class="timetable">
            <tr><th>限</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th></tr>
            {% for period in range(1, 8) %} <tr>
                <td>{{ period }}</td>
                {% for day in ['月', '火', '水', '木', '金'] %}
                <td>
                    <input type="checkbox" name="locked_slots" value="{{ day }}-{{ period }}" id="slot-{{ day }}-{{ period }}">
                    <label for="slot-{{ day }}-{{ period }}">
                        {% if day == '水' and period == 4 %}
                         <span style="font-size: 10px; color: #fdcb6e;">カフプラ固定</span>
                        {% endif %}
                    </label>
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>

        <div class="lever-container" onclick="pullLever()">
            <div class="lever" id="main-lever">
                <div class="lever-handle"></div>
            </div>
            <p>レバーを引いて召喚！</p>
        </div>
    </form>

    <div id="overlay"><div class="shining-light"></div><h2 id="loading-text">カフプラ召喚中...</h2></div>

    <script>
        function pullLever() {
            // レバーを動かす
            document.getElementById('main-lever').classList.add('active');
            
            // 0.5秒後にガチャ演出開始
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('gacha-form').submit();
                }, 2000);
            }, 500);
        }
    </script>
</body>
