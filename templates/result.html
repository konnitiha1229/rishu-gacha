<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ガチャ結果！</title>
    <style>
        body { background: #2d3436; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
        .card { 
            background: white; color: #333; padding: 20px; border-radius: 15px; 
            width: 200px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: bounceIn 0.8s ease;
        }
        /* カフプラ（SSR）だけの特別演出 */
        .ssr { 
            background: linear-gradient(135deg, #ffeaa7, #fab1a0); 
            border: 5px solid #fdcb6e;
            box-shadow: 0 0 30px #fdcb6e;
            transform: scale(1.1);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-back { margin-top: 50px; padding: 10px 30px; background: #6c5ce7; color: white; text-decoration: none; border-radius: 20px; display: inline-block; }
    </style>
</head>
<body>
    <h1>運命の5件はこれだ！</h1>
    <div class="card-container">
        {% for res in results %}
        <div class="card {{ 'ssr' if res.is_ssr else '' }}">
            <h3>{{ res.name }}</h3>
            <p>{{ res.day }}{{ res.period }}限</p>
            <p>学科: {{ res.faculty }}</p>
            <a href="{{ res.syllabus_url }}" target="_blank">シラバスを見る</a>
        </div>
        {% endfor %}
    </div>
    <br>
    <a href="/" class="btn-back">もう一度回す</a>
</body>
</html>
